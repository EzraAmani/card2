<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page-wrapper">
        <div class="cards-container">
            <div class="card">
                <img src="resources/lady6.jpg" alt="image of a lady">
                <div class="user-identity">
                    <h1>Sophie Bennett</h1>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="64" height="64">
                        <!-- Background circle -->
                        <circle cx="12" cy="12" r="10" fill="#22C55E" stroke="#16A34A" stroke-width="1" />
                        <!-- White checkmark -->
                        <polyline points="7,12 10.5,15.5 17,9" fill="none" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <p id="card-content">Product designer who focuses</p>
                <p>on simplicity & usability.</p>
                <div class="card-footer">
                    <div class="card-stats">
                        <div class="stat-item">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span class="stat-number">312</span>
                        </div>
                        <div class="stat-item">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                <polyline points="14 13 16 15 20 11"></polyline>
                            </svg>
                            <span class="stat-number">48</span>
                        </div>
                    </div>

                    <button class="btn-follow">
                        <span>Follow</span>
                        <span class="btn-plus">+</span>
                    </button>
                </div>


            </div>


        </div>
    </div>


</body>

</html>
